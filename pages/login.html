<!DOCTYPE html>
<html>
<head>
  <title>AI Business Autopilot</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
</head>

<body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f3f0;">

  <div class="login-card">

    <!-- App Name -->
    <div class="app-title">
      <span class="dot"></span>
      AI Business Autopilot
    </div>

    <!-- Heading -->
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Login to manage your business</div>

    <!-- Form -->
    <div class="form-group">
      <label>Email</label>
      <input id="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password" />
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <div class="signup-text">
  New user? <span onclick="goToSetup()">Create your business</span>
</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/config.js"></script>
  <script src="../scripts/login.js"></script>

</body>
</html>
