  </div>

  <div class="stat-card">
    <div class="stat-label">New today</div>
    <div class="stat-val" id="newToday">0</div>

  <div class="stat-card">
    <div class="stat-label">Appointments today</div>
    <div class="stat-val" id="appointmentsToday">0</div>

  <div class="stat-card">

  <!-- Recent Conversations -->

    <div class="panel-title">
