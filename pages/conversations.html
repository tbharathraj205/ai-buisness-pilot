<div class="chat-shell">

  <!-- LEFT: Conversations List -->
  <div class="left-panel">

    <div class="lp-header">
      <div class="lp-title">Conversations</div>
      <div class="lp-sub" id="chatCount">0 active</div>
    </div>

    <div class="conv-list" id="conversationList">
      <!-- Conversations will load here -->
    </div>

  </div>

  <!-- RIGHT: Chat Window -->
  <div class="right-panel">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-av" id="chatAvatar">--</div>

      <div>
        <div class="chat-name" id="chatName">Select a chat</div>
        <div class="chat-status">Online</div>
      </div>

      <div class="lead-tag">Lead captured</div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messagesContainer">
      <!-- Messages will load here -->
    </div>

    <!-- Input (read-only AI typing) -->
    <div class="chat-input">
      <div class="chat-input-box">AI is typing a reply...</div>
      <div class="send-btn">
        <div class="send-arrow"></div>
      </div>
    </div>

  </div>

</div>
